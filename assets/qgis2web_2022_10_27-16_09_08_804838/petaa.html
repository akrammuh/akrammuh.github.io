<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="stylesheet" href="css/leaflet.css">
    <link rel="stylesheet" href="css/L.Control.Locate.min.css">
    <link rel="stylesheet" href="css/qgis2web.css">
    <link rel="stylesheet" href="css/fontawesome-all.min.css">
    <link rel="stylesheet" href="css/leaflet-search.css">
    <link rel="stylesheet" href="css/leaflet-control-geocoder.Geocoder.css">
    <link rel="stylesheet" href="css/leaflet-measure.css">
    <style>
        html,
        body,
        #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
    </style>
    <title></title>
</head>

<body>
    <div id="map">
    </div>
    <script src="js/qgis2web_expressions.js"></script>
    <script src="js/leaflet.js"></script>
    <script src="js/L.Control.Locate.min.js"></script>
    <script src="js/leaflet.rotatedMarker.js"></script>
    <script src="js/leaflet.pattern.js"></script>
    <script src="js/leaflet-hash.js"></script>
    <script src="js/Autolinker.min.js"></script>
    <script src="js/rbush.min.js"></script>
    <script src="js/labelgun.min.js"></script>
    <script src="js/labels.js"></script>
    <script src="js/leaflet-control-geocoder.Geocoder.js"></script>
    <script src="js/leaflet-measure.js"></script>
    <script src="js/leaflet-search.js"></script>
    <script src="data/titiklaundry_1.js"></script>
    <script src="data/laundry_2.js"></script>
    <script>
        var map = L.map('map', {
            zoomControl: true,
            maxZoom: 28,
            minZoom: 1
        }).fitBounds([
            [-4.371936950242815, 119.87587836146113],
            [-4.342067412555251, 119.94762311057971]
        ]);
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix(
            '<a href="https://github.com/tomchadwin/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>'
            );
        var autolinker = new Autolinker({
            truncate: {
                length: 30,
                location: 'smart'
            }
        });
        L.control.locate({
            locateOptions: {
                maxZoom: 19
            }
        }).addTo(map);
        var measureControl = new L.Control.Measure({
            position: 'topleft',
            primaryLengthUnit: 'meters',
            secondaryLengthUnit: 'kilometers',
            primaryAreaUnit: 'sqmeters',
            secondaryAreaUnit: 'hectares'
        });
        measureControl.addTo(map);
        document.getElementsByClassName('leaflet-control-measure-toggle')[0]
            .innerHTML = '';
        document.getElementsByClassName('leaflet-control-measure-toggle')[0]
            .className += ' fas fa-ruler';
        var bounds_group = new L.featureGroup([]);

        function setBounds() {}
        map.createPane('pane_GoogleMaps_0');
        map.getPane('pane_GoogleMaps_0').style.zIndex = 400;
        var layer_GoogleMaps_0 = L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
            pane: 'pane_GoogleMaps_0',
            opacity: 1.0,
            attribution: '',
            minZoom: 1,
            maxZoom: 28,
            minNativeZoom: 0,
            maxNativeZoom: 19
        });
        layer_GoogleMaps_0;
        map.addLayer(layer_GoogleMaps_0);

        function pop_titiklaundry_1(feature, layer) {
            var popupContent = '<table>\
                    <tr>\
                        <th scope="row">Nama Laund</th>\
                        <td>' + (feature.properties['Nama Laund'] !== null ? autolinker.link(feature.properties[
                'Nama Laund'].toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Longitude</th>\
                        <td>' + (feature.properties['Longitude'] !== null ? autolinker.link(feature.properties[
                'Longitude'].toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Latitude</th>\
                        <td>' + (feature.properties['Latitude'] !== null ? autolinker.link(feature.properties[
                'Latitude'].toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Foto</th>\
                        <td>' + (feature.properties['Foto'] !== null ? '<img src="images/' + String(feature.properties[
                'Foto']).replace(/[\\\/:]/g, '_').trim() + '">' : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Pemilik</th>\
                        <td>' + (feature.properties['Pemilik'] !== null ? autolinker.link(feature.properties['Pemilik']
                .toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Buka/Tutup</th>\
                        <td>' + (feature.properties['Buka/Tutup'] !== null ? autolinker.link(feature.properties[
                'Buka/Tutup'].toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            layer.bindPopup(popupContent, {
                maxHeight: 400
            });
        }

        function style_titiklaundry_1_0() {
            return {
                pane: 'pane_titiklaundry_1',
                rotationAngle: 0.0,
                rotationOrigin: 'center center',
                icon: L.icon({
                    iconUrl: 'markers/shopping_laundrette.svg',
                    iconSize: [22.04, 22.04]
                }),
                interactive: true,
            }
        }
        map.createPane('pane_titiklaundry_1');
        map.getPane('pane_titiklaundry_1').style.zIndex = 401;
        map.getPane('pane_titiklaundry_1').style['mix-blend-mode'] = 'normal';
        var layer_titiklaundry_1 = new L.geoJson(json_titiklaundry_1, {
            attribution: '',
            interactive: true,
            dataVar: 'json_titiklaundry_1',
            layerName: 'layer_titiklaundry_1',
            pane: 'pane_titiklaundry_1',
            onEachFeature: pop_titiklaundry_1,
            pointToLayer: function (feature, latlng) {
                var context = {
                    feature: feature,
                    variables: {}
                };
                return L.marker(latlng, style_titiklaundry_1_0(feature));
            },
        });
        bounds_group.addLayer(layer_titiklaundry_1);
        map.addLayer(layer_titiklaundry_1);

        function pop_laundry_2(feature, layer) {
            var popupContent = '<table>\
                    <tr>\
                        <th scope="row">id</th>\
                        <td>' + (feature.properties['id'] !== null ? autolinker.link(feature.properties['id']
                .toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            layer.bindPopup(popupContent, {
                maxHeight: 400
            });
        }

        function style_laundry_2_0() {
            return {
                pane: 'pane_laundry_2',
                rotationAngle: 0.0,
                rotationOrigin: 'center center',
                icon: L.icon({
                    iconUrl: 'markers/shopping_laundrette.svg',
                    iconSize: [22.04, 22.04]
                }),
                interactive: true,
            }
        }
        map.createPane('pane_laundry_2');
        map.getPane('pane_laundry_2').style.zIndex = 402;
        map.getPane('pane_laundry_2').style['mix-blend-mode'] = 'normal';
        var layer_laundry_2 = new L.geoJson(json_laundry_2, {
            attribution: '',
            interactive: true,
            dataVar: 'json_laundry_2',
            layerName: 'layer_laundry_2',
            pane: 'pane_laundry_2',
            onEachFeature: pop_laundry_2,
            pointToLayer: function (feature, latlng) {
                var context = {
                    feature: feature,
                    variables: {}
                };
                return L.marker(latlng, style_laundry_2_0(feature));
            },
        });
        bounds_group.addLayer(layer_laundry_2);
        map.addLayer(layer_laundry_2);
        var osmGeocoder = new L.Control.Geocoder({
            collapsed: true,
            position: 'topleft',
            text: 'Search',
            title: 'Testing'
        }).addTo(map);
        document.getElementsByClassName('leaflet-control-geocoder-icon')[0]
            .className += ' fa fa-search';
        document.getElementsByClassName('leaflet-control-geocoder-icon')[0]
            .title += 'Search for a place';
        var baseMaps = {};
        L.control.layers(baseMaps, {
            '<img src="legend/laundry_2.png" /> laundry': layer_laundry_2,
            '<img src="legend/titiklaundry_1.png" /> titiklaundry': layer_titiklaundry_1,
            "Google Maps": layer_GoogleMaps_0,
        }).addTo(map);
        setBounds();
        map.addControl(new L.Control.Search({
            layer: layer_titiklaundry_1,
            initial: false,
            hideMarkerOnCollapse: true,
            propertyName: 'Nama Laund'
        }));
        document.getElementsByClassName('search-button')[0].className +=
            ' fa fa-binoculars';
    </script>
</body>

</html>
